backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/YOUR_GITHUB_USERNAME.github.io
  branch: main

media_folder: "public/images"
public_folder: "/public/images"

collections:
  - name: "posts"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "post"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Featured Cover Image", name: "image", widget: "image", required: false}
      - {label: "Tags (lowercase matched to filters)", name: "tags", widget: "list"}
      - {label: "Excerpt summary", name: "excerpt", widget: "text"}
      - {label: "Body Editor", name: "body", widget: "markdown"}
