backend:
  name: github
  repo: adityajshettigar/adityajshettigar.github.io
  branch: main

local_backend: true

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "posts"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    identifier_field: "title"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "post"}
      - {label: "Title", name: "title", widget: "string", required: true}
      - {label: "Publish Date", name: "date", widget: "datetime", required: true}
      - {label: "Featured Image", name: "image", widget: "image", required: false}
      - {label: "Tags", name: "tags", widget: "list", required: true, default: ["research"]}
      - {label: "Excerpt", name: "excerpt", widget: "text", required: true, hint: "A short summary shown on the homepage"}
      - {label: "Body", name: "body", widget: "markdown", required: true}