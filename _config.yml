title: "Aditya J Shettigar"
description: "Security research, OSINT tools, CTF writeups and build logs."
url: "https://adityajshettigar.github.io"
baseurl: ""
author: "Aditya J Shettigar"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# Collections
collections:
  posts:
    output: true
    permalink: /:year/:month/:day/:title/

# Default front matter defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-feed

exclude:
  - README.md
  - node_modules/
  - Gemfile
  - Gemfile.lock
  - .gitignore
  - admin/