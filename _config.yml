title: "Aditya J Shettigar"
description: "Security research, OSINT tools, CTF writeups and build logs."
url: "https://adityajshettigar.github.io"
baseurl: ""
author: "Aditya J Shettigar"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/
excerpt_separator: <!--more-->

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

plugins:
  - jekyll-feed
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .gitignore
  - README.md