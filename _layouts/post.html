---
layout: default
---

<style>
  .post-container {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 24px 96px;
  }

  .post-back {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: var(--text-light);
    text-decoration: none;
    margin-bottom: 48px;
    transition: color 0.2s ease;
  }

  .post-back:hover {
    color: var(--accent);
  }

  .post-header {
    margin-bottom: 48px;
  }

  .post-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .post-tag {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    background: var(--code-bg);
    color: var(--text-light);
    text-decoration: none;
  }

  .post-title {
    font-size: 44px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 20px;
    color: var(--text);
  }

  .post-meta {
    font-size: 14px;
    color: var(--text-light);
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }

  .post-image {
    width: 100%;
    border-radius: 12px;
    margin: 48px 0;
    border: 1px solid var(--border);
  }

  /* Content Styling */
  .post-content {
    font-size: 17px;
    line-height: 1.75;
    color: var(--text);
  }

  .post-content > * + * {
    margin-top: 28px;
  }

  .post-content h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-top: 48px;
    margin-bottom: 16px;
  }

  .post-content h2 {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-top: 48px;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .post-content h3 {
    font-size: 22px;
    font-weight: 600;
    margin-top: 36px;
    margin-bottom: 12px;
  }

  .post-content a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s ease;
  }

  .post-content a:hover {
    border-bottom-color: var(--accent);
  }

  .post-content code {
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 14px;
    padding: 2px 6px;
    background: var(--code-bg);
    border-radius: 4px;
    color: var(--code-text);
  }

  .post-content pre {
    background: var(--code-bg);
    padding: 20px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 32px 0;
  }

  .post-content pre code {
    background: none;
    padding: 0;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
  }

  .post-content blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 20px;
    margin: 32px 0;
    color: var(--text-light);
    font-style: italic;
  }

  .post-content ul, 
  .post-content ol {
    padding-left: 24px;
  }

  .post-content li {
    margin: 8px 0;
  }

  .post-content img {
    max-width: 100%;
    border-radius: 8px;
    margin: 32px 0;
  }

  .post-content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 48px 0;
  }

  .post-footer {
    margin-top: 64px;
    padding-top: 32px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
  }

  .post-footer a {
    font-size: 14px;
    color: var(--text-light);
    text-decoration: none;
    transition: color 0.2s ease;
  }

  .post-footer a:hover {
    color: var(--accent);
  }

  @media (max-width: 640px) {
    .post-title {
      font-size: 32px;
    }
    .post-content {
      font-size: 16px;
    }
  }
</style>

<div class="post-container">
  <a href="/" class="post-back">
    ← Back to all posts
  </a>

  <div class="post-header">
    <div class="post-tags">
      {% for tag in page.tags %}
        <span class="post-tag">{{ tag }}</span>
      {% endfor %}
    </div>
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <span>{{ page.date | date: "%B %d, %Y" }}</span>
      <span>·</span>
      <span>{{ content | number_of_words }} words</span>
    </div>
  </div>

  {% if page.image %}
    <img class="post-image" src="{{ page.image }}" alt="{{ page.title }}">
  {% endif %}

  <div class="post-content">
    {{ content }}
  </div>

  <div class="post-footer">
    <a href="/">← Browse all posts</a>
    <a href="https://github.com/adityajshettigar" target="_blank" rel="noopener">GitHub →</a>
  </div>
</div>
