<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
  <meta name="author" content="{{ site.author }}">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #fafaf9;
      --surface: #ffffff;
      --border: #e6e6e5;
      --text: #1c1c1c;
      --text-light: #5e5e5e;
      --accent: #0a5c4e;
      --accent-light: #e6f4f1;
      --code-bg: #f4f4f3;
      --code-text: #d73a49;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a;
        --surface: #252525;
        --border: #333333;
        --text: #e5e5e5;
        --text-light: #a0a0a0;
        --accent: #7ab3a8;
        --accent-light: #2a3a36;
        --code-bg: #2a2a2a;
        --code-text: #ff7b72;
      }
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      line-height: 1.6;
    }

    /* Navigation */
    .site-nav {
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
      background: rgba(var(--bg-rgb, 250, 250, 249), 0.8);
    }

    .nav-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }

    .logo span {
      color: var(--accent);
    }

    .nav-links {
      display: flex;
      gap: 28px;
    }

    .nav-links a {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-light);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .nav-links a:hover {
      color: var(--accent);
    }

    /* Main Content */
    main {
      min-height: 70vh;
    }

    /* Footer */
    .site-footer {
      border-top: 1px solid var(--border);
      margin-top: 80px;
      padding: 48px 24px;
    }

    .footer-container {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .footer-copyright {
      font-size: 13px;
      color: var(--text-light);
    }

    .footer-links {
      display: flex;
      gap: 24px;
    }

    .footer-links a {
      font-size: 13px;
      color: var(--text-light);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .footer-links a:hover {
      color: var(--accent);
    }

    @media (max-width: 640px) {
      .footer-container {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <nav class="site-nav">
    <div class="nav-container">
      <a href="/" class="logo">aditya<span>.</span></a>
      <div class="nav-links">
        <a href="/">writings</a>
        <a href="https://github.com/adityajshettigar" target="_blank" rel="noopener">github</a>
        <a href="https://linkedin.com/in/adityajshettigar" target="_blank" rel="noopener">linkedin</a>
      </div>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-container">
      <div class="footer-copyright">
        © {{ site.time | date: '%Y' }} {{ site.author }}
      </div>
      <div class="footer-links">
        <a href="mailto:aditya@adityajshettigar.in">email</a>
        <a href="https://github.com/adityajshettigar" target="_blank">github</a>
        <a href="https://linkedin.com/in/adityajshettigar" target="_blank">linkedin</a>
      </div>
    </div>
  </footer>
</body>
</html>
