<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #fefefe;
      --surface: #ffffff;
      --border: #eaeaea;
      --text-primary: #111111;
      --text-secondary: #5b5b5b;
      --text-tertiary: #8a8a8a;
      --accent: #d44c2f;
      --accent-muted: #fae9e5;
      --code-bg: #f7f7f7;
      --code-border: #e8e8e8;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d0d0d;
        --surface: #141414;
        --border: #242424;
        --text-primary: #ededed;
        --text-secondary: #a0a0a0;
        --text-tertiary: #707070;
        --accent: #e8684a;
        --accent-muted: #2a1a16;
        --code-bg: #1a1a1a;
        --code-border: #2a2a2a;
      }
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.6;
      letter-spacing: -0.003em;
    }

    /* Navigation */
    .site-nav {
      padding: 28px 0;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .nav-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 20px;
      font-weight: 500;
      letter-spacing: -0.3px;
      color: var(--text-primary);
      text-decoration: none;
    }

    .logo-dot {
      color: var(--accent);
    }

    .nav-links {
      display: flex;
      gap: 32px;
    }

    .nav-links a {
      font-size: 14px;
      font-weight: 450;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .nav-links a:hover {
      color: var(--accent);
    }

    main {
      min-height: 60vh;
    }

    /* Footer */
    .site-footer {
      margin-top: 100px;
      padding: 48px 28px;
      border-top: 1px solid var(--border);
    }

    .footer-container {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 24px;
    }

    .footer-text {
      font-size: 13px;
      color: var(--text-tertiary);
    }

    .footer-links {
      display: flex;
      gap: 28px;
    }

    .footer-links a {
      font-size: 13px;
      color: var(--text-tertiary);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .footer-links a:hover {
      color: var(--accent);
    }

    @media (max-width: 640px) {
      .footer-container {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <nav class="site-nav">
    <div class="nav-container">
      <a href="/" class="logo">aditya<span class="logo-dot">·</span></a>
      <div class="nav-links">
        <a href="/">writings</a>
        <a href="https://github.com/adityajshettigar" target="_blank">github</a>
        <a href="https://linkedin.com/in/adityajshettigar" target="_blank">linkedin</a>
      </div>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-container">
      <div class="footer-text">
        © {{ site.time | date: '%Y' }} Aditya J Shettigar
      </div>
      <div class="footer-links">
        <a href="mailto:aditya@adityajshettigar.in">email</a>
        <a href="https://github.com/adityajshettigar" target="_blank">github</a>
        <a href="https://linkedin.com/in/adityajshettigar" target="_blank">linkedin</a>
      </div>
    </div>
  </footer>
</body>
</html>
