<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #fefefe;
      --surface: #ffffff;
      --border: #eaeaea;
      --text-primary: #111111;
      --text-secondary: #5b5b5b;
      --text-tertiary: #8a8a8a;
      --accent: #d44c2f;
      --accent-muted: #fae9e5;
      --code-bg: #f7f7f7;
      --code-border: #e8e8e8;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d0d0d;
        --surface: #141414;
        --border: #242424;
        --text-primary: #ededed;
        --text-secondary: #a0a0a0;
        --text-tertiary: #707070;
        --accent: #e8684a;
        --accent-muted: #2a1a16;
        --code-bg: #1a1a1a;
        --code-border: #2a2a2a;
      }
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.6;
      letter-spacing: -0.003em;
    }

    main {
      min-height: 60vh;
    }

    /* Footer */
    .site-footer {
      margin-top: 100px;
      padding: 48px 28px;
      border-top: 1px solid var(--border);
    }

    .footer-container {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 24px;
    }

    .footer-text {
      font-size: 13px;
      color: var(--text-tertiary);
    }

    .footer-links {
      display: flex;
      gap: 28px;
      align-items: center;
    }

    .footer-links a {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-tertiary);
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .footer-links a:hover {
      color: var(--accent);
      transform: translateY(-1px);
    }

    .footer-links svg {
      width: 16px;
      height: 16px;
    }

    @media (max-width: 640px) {
      .footer-container {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-container">
      <div class="footer-text">
        © {{ site.time | date: '%Y' }} Aditya J Shettigar
      </div>
      <div class="footer-links">
        <a href="mailto:aditya@adityajshettigar.in">

            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>

  </footer>
</body>
</html>
