<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0b0b0d;
      --surface:    #111115;
      --border:     #1d1d24;
      --text:       #e0e1e6;
      --muted:      #565869;
      --accent:     #5ef3d2;
      --accent-dim: #152e27;
      --serif:      'Instrument Serif', Georgia, serif;
      --mono:       'Geist Mono', 'Fira Code', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 15px;
      line-height: 1.65;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      display: block;
      height: 2px;
      background: linear-gradient(90deg, var(--accent) 0%, transparent 60%);
      flex-shrink: 0;
    }

    nav {
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-inner {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      text-decoration: none;
      letter-spacing: .02em;
    }
    .nav-logo .at { color: var(--accent); }
    .nav-logo .tilde { color: var(--muted); }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: .08em;
      text-transform: uppercase;
      transition: color .12s;
    }
    .nav-links a:hover { color: var(--text); }

    main { flex: 1; }

    footer {
      border-top: 1px solid var(--border);
      padding: 32px 24px;
      margin-top: auto;
    }
    .footer-inner {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .footer-left p {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .footer-left p:last-child { margin-bottom: 0; }
    .footer-socials {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .footer-socials a {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: .06em;
      text-transform: uppercase;
      transition: color .12s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .footer-socials a:hover { color: var(--accent); }
    .footer-socials .sep {
      color: var(--border);
      font-size: 14px;
    }

    @media (max-width: 520px) {
      .footer-inner { flex-direction: column; align-items: flex-start; gap: 16px; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
